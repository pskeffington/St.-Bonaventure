name: Validate catalog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate catalog structure
        run: python scripts/validate_catalog.py
